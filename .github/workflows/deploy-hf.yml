name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'models/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'requirements.lock.txt'
  workflow_dispatch:

# Least-privilege — only needs to read code and push to external HF repo
permissions:
  contents: read

# Only one deploy at a time
concurrency:
  group: deploy-hf
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy from the main repo, never from forks
    if: github.repository == 'Ashut0sh-mishra/agri-analyze'
    environment: production
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # Global credential helper for HF
          git config --global credential.helper "!f() { echo username=ashu010; echo password=${HF_TOKEN}; }; f"

          GH_DIR=$(pwd)

          # Clone existing HF Space (preserves model weights already uploaded there)
          cd /tmp
          git clone https://huggingface.co/spaces/ashu010/agri-drone-api hf-space
          cd hf-space

          # Wipe code-only dirs (keep models/ and any other binary assets HF holds)
          for p in src configs deploy pyproject.toml requirements.lock.txt LICENSE CHANGELOG.md CITATION.cff README.md Dockerfile; do
            rm -rf "$p"
          done

          # Copy fresh code from GH checkout
          for p in src configs deploy pyproject.toml requirements.lock.txt LICENSE CHANGELOG.md CITATION.cff; do
            [ -e "$GH_DIR/$p" ] && cp -r "$GH_DIR/$p" ./ || true
          done

          # Swap README + Dockerfile with HF-specific versions
          cp "$GH_DIR/deploy/hf-readme.md" README.md
          cp "$GH_DIR/deploy/Dockerfile.hf" Dockerfile

          # Ensure models/ exists so Dockerfile COPY doesn't fail
          mkdir -p models
          [ -f models/.gitkeep ] || touch models/.gitkeep

          git add -A
          git commit -m "deploy: sync code from GH commit $(git -C "$GH_DIR" log -1 --format=%h main)" --allow-empty
          git push origin main
