name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'models/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'requirements.lock.txt'
  workflow_dispatch:

# Least-privilege — only needs to read code and push to external HF repo
permissions:
  contents: read

# Only one deploy at a time
concurrency:
  group: deploy-hf
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy from the main repo, never from forks
    if: github.repository == 'Ashut0sh-mishra/agri-analyze'
    environment: production
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Create a deploy branch with only the files HF Spaces needs
          git checkout -b hf-deploy

          # Strip large/non-essential dirs (HF rejects binary files outside Xet/LFS)
          git rm -rf --ignore-unmatch \
            docs evaluate/results evaluate/results_wheat paper notebooks \
            runs outputs data datasets agrianalyze-data agrianalyze-models \
            agri-analyze-frontend agrianalyze-training tests tools \
            AgriAnalyze_paper.pdf AgriAnalyze_paper_final.pdf \
            yolov8n.pt yolov8n-seg.pt > /dev/null 2>&1 || true
          git commit -m "deploy: strip non-essential dirs for HF Spaces" --allow-empty

          # Swap README and Dockerfile with HF-specific versions
          cp deploy/hf-readme.md README.md
          cp deploy/Dockerfile.hf Dockerfile
          git add README.md Dockerfile
          git commit -m "deploy: swap README + Dockerfile for HF Spaces" --allow-empty

          # Push to HuggingFace Spaces (use credential helper to avoid URL parsing issues with token chars)
          git remote remove hf 2>/dev/null || true
          git remote add hf https://huggingface.co/spaces/ashu010/agri-drone-api
          git -c credential.helper= -c credential.helper="!f() { echo username=ashu010; echo password=${HF_TOKEN}; }; f" push hf hf-deploy:main --force
