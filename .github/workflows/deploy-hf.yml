name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'models/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'requirements.lock.txt'
  workflow_dispatch:

# Least-privilege — only needs to read code and push to external HF repo
permissions:
  contents: read

# Only one deploy at a time
concurrency:
  group: deploy-hf
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy from the main repo, never from forks
    if: github.repository == 'Ashut0sh-mishra/agri-analyze'
    environment: production
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Create an orphan deploy branch (no history) so HF doesn't see large blobs from past commits
          git checkout --orphan hf-deploy
          git rm -rf --cached . > /dev/null 2>&1 || true

          # Stage only the dirs/files HF needs (each path is optional — ignore missing)
          for p in src configs models pyproject.toml requirements.lock.txt deploy LICENSE CHANGELOG.md CITATION.cff; do
            [ -e "$p" ] && git add "$p" || true
          done

          # Swap README and Dockerfile with HF-specific versions
          cp deploy/hf-readme.md README.md
          cp deploy/Dockerfile.hf Dockerfile
          git add README.md Dockerfile

          git commit -m "deploy: HF Spaces snapshot from $(git -C . log -1 --format=%h main)"

          # Push to HuggingFace Spaces (use credential helper to avoid URL parsing issues with token chars)
          git remote remove hf 2>/dev/null || true
          git remote add hf https://huggingface.co/spaces/ashu010/agri-drone-api
          git -c credential.helper= -c credential.helper="!f() { echo username=ashu010; echo password=${HF_TOKEN}; }; f" push hf hf-deploy:main --force
