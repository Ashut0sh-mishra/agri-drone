# Quick matrix for Colab T4 (~2 h).
#
# 2 backbones x 2 rule engines x 2 train fractions x 1 dataset x 1 fold = 8 cells.
# Used by notebooks/colab/01_run_matrix.ipynb in the default "quick" mode.

run_id: "quick-colab-t4"

axes:
  backbone:
    - yolov8n-cls
    - efficientnet_b0

  rule_engine:
    - none
    - handcrafted

  train_fraction:
    - 1.0
    - 0.25

  dataset:
    - plantvillage_subset

  cv:
    n_folds: 1
    seeds: [42]

training_recipe:
  epochs: 25
  batch_size: 32
  optimizer: adamw
  lr: 0.00125
  weight_decay: 1.0e-4
  lr_schedule: cosine
  warmup_epochs: 2
  augmentation: standard_v1
  early_stopping_patience: 5
  input_size: 224
  label_smoothing: 0.1

tracker: none

output:
  root: evaluate/results/v2/matrix
  compress_predictions: true

execution:
  resume: true
  fail_fast: false
  max_parallel_cells: 1
